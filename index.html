<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Web App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Welcome to My Future Web App</h1>
    <p>Click the button below to trigger an action.</p>
    <button onclick="greetUser()">Activate App</button>

    <script>
        function greetUser() {
            alert("Hello! You just ran your first web app script. Next step: connecting to an AI!");
        }
    </script>

</body>
</html>
